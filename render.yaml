services:
  - type: web
    name: back-1
    runtime: node
    buildCommand: ./render-build.sh
    startCommand: ./render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: MEDIA_PATH
        value: media
      - key: KARAOKE_INSTRUMENTAL_TTL_MS
        value: "600000"
      - key: KARAOKE_SEPARATION_TIMEOUT_MS
        value: "2700000"
      - key: KARAOKE_SEPARATION_IDLE_TIMEOUT_MS
        value: "300000"
      - key: KARAOKE_SESSIONS_TTL_MS
        value: "86400000"
      - key: KARAOKE_SESSIONS_MAX
        value: "120"
      - key: KARAOKE_DEMUCS_STRICT
        value: "0"
      - key: KARAOKE_DEMUCS_ENABLED
        value: "1"
      - key: KARAOKE_DEMUCS_MODEL
        value: htdemucs
      - key: ANIDL_ENABLED
        value: "1"
      - key: ANIDL_REF
        value: v5.7.0
      - key: ANIDL_TIMEOUT_MS
        value: "2700000"
